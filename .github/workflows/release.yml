name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.pkg.outputs.version }} already exists — nothing to do."

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.pkg.outputs.version }}"
          git push origin "${{ steps.pkg.outputs.version }}"

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.exists == 'false'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      - name: Build bundle
        if: steps.check.outputs.exists == 'false'
        run: bun run build

      - name: Verify bundle
        if: steps.check.outputs.exists == 'false'
        run: |
          node dist/index.js --version
          ls -lh dist/index.js

      - name: Prepare release artifact
        if: steps.check.outputs.exists == 'false'
        run: cp dist/index.js af

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          name: "aflow ${{ steps.pkg.outputs.version }}"
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/iceglober/aflow/main/install.sh | bash
            ```

            ## Update

            ```bash
            af upgrade
            ```
          files: af
          generate_release_notes: true
